    <main class = "page_description">
        <h3> Zimo | Portable Charger Stations in London</h3>

    <!--Implemntation following Google Maps documentation:-->
    <!--https://developers.google.com/maps/documentation/javascript/add-google-map-wc-tut-->
    <script
        src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyDYLEegtKLJagFTUGpeA38sO8YakqQsX4M&callback=initMap"
        defer
    ></script>

    <script>
        function initMap(){
            // Coordinates were taken from Google
            const greater_london = {lat: 51.5073, lng: -0.1277 };

            const map = new google.maps.Map(document.getElementById("map"), {
                center: greater_london,
                zoom: 10,
            });
        };
    </script>
