<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">

    <link rel = "stylesheet" href = "pagetemplate.css">
    <link rel = "stylesheet" href = "feedback.css">
    <title>Zimo - Feedback</title>

</head>

<body>
    <header class = "navigation_container">
        <h1>Zimo</h1>
        <nav class = "navigation_links">
            <a href = "index.html">Home</a>
            <a href = "about.html">About</a>
            <a href = "feedback.html" class = "active">Feedback</a> 
        </nav>
    </header>

    <main class = "feedback_container">
        <h1>We would love to hear from you</h1>
        
        <h3>Share you experience with Zimo, Your feedback helps us improve!</h3>

        <form id= "feedback_form" class = "feedback_form">
            <label for = "feedback_topic"><strong>What would you like to give feedback on?</strong></label>
            <select id = "feedback_topic" name = "feedback_topic" required>
                <option value = "" disabled selected>-----Select a topic-----</option>
                <option value = "map">Map</option>
                <option value = "station_panel">Station Details Panel</option>
                <option value = "website_layout">Website Layout & Design</option>
                <option value = "search_functionality">Search Functionality</option>
                <option value = "rent_return">Rent / Return Process</option>
                <option value = "general">General Feedback</option>
                <option value = "other">Other</option>   
            </select>
            
            <label for = "suggestion"><strong>Your Suggestion:</strong></label>
            <textarea id = "suggestion" name = "suggestion" placeholder="Tell us what you think:" required></textarea>
            
            <label><strong>How likely are you to recommend Zimo?</strong></label>
            <div class = "recommendation_options">
                <label><input type = "radio" name = "recommend" value = "very_likely" required>Very Likely</label>
                <label><input type = "radio" name = "recommend" value = "likely">Likely</label>
                <label><input type = "radio" name = "recommend" value = "neutral">Neutral</label>
                <label><input type = "radio" name = "recommend" value = "unlikely">Unlikely</label>
                <label><input type = "radio" name = "recommend" value = "very_unlikely">Very Unlikely</label>   
            </div>
           
            <button type = "submit">Submit</button>
        </form>

    </main>
    
    <script src = "script.js"></script>
    
</body>
